<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EduConnect-Login</title>

</head>
<body class="login body">
  <header class="navbar">
    <a href="/" class="logo-link">
      <img src="/images/E.png" alt="EduConnect" class="nav-icon">
    </a>
  </header>

<div class="login container">

  <!-- LEFT SIDE -->
  
  <!-- RIGHT SIDE -->

      <input type="password" placeholder="Confirm Password" required>

    </form>
  
  </div>
</div>

</body>
</html>
