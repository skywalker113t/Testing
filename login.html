<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login body">

<header class="navbar">
  <h2>EduConnect</h2>
</header>

<div class="login container">

  <!-- LEFT SIDE -->
  <div class="left">
    <h1>Welcome Back!</h1>
    <p>
      Log in to continue your journey: structured learning, real projects,
      and accountability groups.
    </p>
  </div>
  
  <!-- RIGHT SIDE -->
  <div class="right">
    <h2>Sign In</h2>

    <form>
      <label>Email</label>
      <input type="email" placeholder="Enter your email">

      <label>Password</label>
      <input type="password" placeholder="Enter your password">

      <button type="submit">Login</button>

      <p class="signup-link">
        Don't have an account? <a href="#">Sign Up</a>
      </p>
    </form>
  </div>

</div>

</body>
</html>
