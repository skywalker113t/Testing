<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduConnect-Login</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

  <!-- Top Navbar -->
  <div class="navbar">
    <div class="logo">EduConnect</div>
  </div>

  <!-- Main Login Section -->
  <div class="login-wrapper">
    <div class="login-container">

      <!-- LEFT SIDE -->
      <div class="login-left">
        <h1>Welcome Back!</h1>
        <p>
          Log in to continue your journey: structured learning, real
          projects, and accountability groups.
        </p>

        <!-- Optional Image -->
        <img src="https://via.placeholder.com/150" alt="Team learning" style="margin-top:20px;">
      </div>

      <!-- RIGHT SIDE -->
      <div class="login-right">
        <h2>Sign In</h2>

        <form>
          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
          </div>

          <button type="submit" class="login-btn">Login</button>
        </form>

        <p class="login-footer">
          Don't have an account?
          <a href="signup.html">Sign Up</a>
        </p>
      </div>

    </div>
  </div>

</body>
</html>
